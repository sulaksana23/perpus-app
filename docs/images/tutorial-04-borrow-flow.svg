<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Tutorial 4 borrow flow">
  <rect width="1200" height="520" fill="#f3f7fb"/>
  <rect x="40" y="30" width="1120" height="90" rx="16" fill="#0891b2"/>
  <text x="70" y="85" fill="#fff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Tutorial 4: Alur Peminjaman Buku</text>

  <rect x="90" y="170" width="200" height="120" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="110" y="220" font-family="Arial, sans-serif" font-size="19" fill="#0f172a" font-weight="700">User pilih buku</text>

  <rect x="340" y="170" width="240" height="120" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="360" y="220" font-family="Arial, sans-serif" font-size="19" fill="#0f172a" font-weight="700">Submit pengajuan</text>
  <text x="360" y="248" font-family="Arial, sans-serif" font-size="16" fill="#334155">Kode: TRX-YYYYMMDD-0001</text>

  <rect x="630" y="170" width="220" height="120" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="650" y="220" font-family="Arial, sans-serif" font-size="19" fill="#0f172a" font-weight="700">Admin ACC</text>

  <rect x="900" y="170" width="220" height="120" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="920" y="220" font-family="Arial, sans-serif" font-size="19" fill="#0f172a" font-weight="700">Set Dipinjam</text>
  <text x="920" y="248" font-family="Arial, sans-serif" font-size="16" fill="#334155">Stok berkurang</text>

  <path d="M295 230 L330 230" stroke="#0ea5a4" stroke-width="4" marker-end="url(#arr4)"/>
  <path d="M585 230 L620 230" stroke="#0ea5a4" stroke-width="4" marker-end="url(#arr4)"/>
  <path d="M855 230 L890 230" stroke="#0ea5a4" stroke-width="4" marker-end="url(#arr4)"/>

  <rect x="420" y="345" width="360" height="110" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="450" y="390" font-family="Arial, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Set Dikembalikan</text>
  <text x="450" y="420" font-family="Arial, sans-serif" font-size="18" fill="#334155">Status returned + stok bertambah kembali</text>

  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5a4" />
    </marker>
